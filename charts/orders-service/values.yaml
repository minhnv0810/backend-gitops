nameOverride: orders-service

image:
  repository: "minh4862/orders-service"
  tag: "latest"

service:
  port: 3003

env:
  NODE_ENV: production
  RABBITMQ_EXCHANGE: domain.events
  PRODUCT_SERVICE_URL: http://product-service:3002
  PRODUCT_SERVICE_TIMEOUT_MS: "3000"
  LOG_LEVEL: info

envSecretRefs:
  - orders-service-secrets # DATABASE_URL, RABBITMQ_URL, JWT_PUBLIC_KEY

networkPolicy:
  enabled: true
  allowExternal: false
