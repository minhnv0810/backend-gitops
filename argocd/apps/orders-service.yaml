apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders-service
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/<github-user>/backend-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/<github-user>/backend-gitops.git
      targetRevision: main
      path: charts/service
      helm:
        valueFiles:
          - $values/charts/orders-service/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: backend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
