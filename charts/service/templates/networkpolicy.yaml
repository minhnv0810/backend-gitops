{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "service.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- if .Values.networkPolicy.allowExternal }}
    # Only the ingress controller may reach api-gateway from outside the namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    {{- else }}
    # Downstream services only accept traffic from api-gateway, per
    # docs/01-architecture/09-security.md trust boundary.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
    {{- end }}
{{- end }}
